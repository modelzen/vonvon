<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Vonvon</title>
    <style>
      :root {
        --kirby-panel-width: 120px;
        --kirby-panel-height: 120px;
        --kirby-form-transition-duration: 200ms;
        --kirby-form-scale-from: 0.9;
        --kirby-form-scale-to: 1;
        --kirby-form-transition-easing: ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-app-region: drag;
      }

      #root {
        width: var(--kirby-panel-width);
        height: var(--kirby-panel-height);
        position: relative;
      }

      /*
       * The HTML no longer hardcodes a specific pink-ball drawing.
       * Instead, it renders a manifest-driven asset pack. The native layer
       * still switches between the same 4 abstract forms, but the actual art
       * now lives in /kirby-packs/<pack-id>/ and can be replaced without
       * touching this file.
       */
      .kirby-form {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transform: scale(var(--kirby-form-scale-from));
        transition:
          opacity var(--kirby-form-transition-duration) var(--kirby-form-transition-easing),
          transform var(--kirby-form-transition-duration) var(--kirby-form-transition-easing);
        pointer-events: none;
      }

      .kirby-form.active {
        opacity: 1;
        transform: scale(var(--kirby-form-scale-to));
        pointer-events: auto;
      }

      .kirby-form img {
        width: 100%;
        height: 100%;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .kirby-form.transition-layer {
        z-index: 12;
      }
    </style>
  </head>
  <body>
    <div id="root" aria-label="kirby-ball"></div>

    <script>
      ;(function () {
        var FORM_ORDER = ['floating', 'snapping', 'dockedExpanded', 'dockedCollapsed']
        var FORM_CLASS = {
          floating: 'floating',
          snapping: 'snapping',
          dockedExpanded: 'docked-expanded',
          dockedCollapsed: 'docked-collapsed'
        }
        var DEFAULT_PACK_ID = 'default'
        var root = document.getElementById('root')
        var activeForm = 'floating'
        var runtime = {
          manifest: null,
          assetBase: '',
          nodes: {},
          transitionLayer: null,
          assetCache: {},
          stateTimer: 0,
          transitionTimer: 0,
          stateAnimationToken: 0,
          transitionToken: 0,
          transitionPlaying: false
        }

        function decodeBase64Url(input) {
          var base64 = String(input || '').replace(/-/g, '+').replace(/_/g, '/')
          while (base64.length % 4) base64 += '='
          var binary = atob(base64)
          var bytes = new Uint8Array(binary.length)
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i)
          return new TextDecoder().decode(bytes)
        }

        function fallbackManifest(packId) {
          return {
            meta: {
              id: packId || DEFAULT_PACK_ID,
              name: 'Fallback Pink Ball',
              version: 1,
              specVersion: 1
            },
            layout: {
              panel: { width: 120, height: 120 },
              anchor: { x: 60, y: 60 },
              hitArea: { type: 'circle', cx: 60, cy: 60, r: 40 }
            },
            transitions: {
              formSwitch: { durationMs: 200, scaleFrom: 0.9, scaleTo: 1, easing: 'ease' }
            },
            states: {
              floating: { kind: 'single', src: 'floating.svg' },
              snapping: { kind: 'single', src: 'snapping.svg' },
              dockedExpanded: { kind: 'single', src: 'docked-expanded.svg' },
              dockedCollapsed: { kind: 'single', src: 'docked-collapsed.svg' }
            }
          }
        }

        function normalizeManifest(manifest, packId) {
          var base = fallbackManifest(packId)
          var normalized = {
            meta: Object.assign({}, base.meta, manifest && manifest.meta),
            layout: {
              panel: Object.assign({}, base.layout.panel, manifest && manifest.layout && manifest.layout.panel),
              anchor: Object.assign({}, base.layout.anchor, manifest && manifest.layout && manifest.layout.anchor),
              hitArea: Object.assign({}, base.layout.hitArea, manifest && manifest.layout && manifest.layout.hitArea)
            },
            transitions: {
              formSwitch: Object.assign(
                {},
                base.transitions.formSwitch,
                manifest && manifest.transitions && manifest.transitions.formSwitch
              ),
              detach: Object.assign(
                {},
                manifest && manifest.transitions && manifest.transitions.detach
              ),
              panelMove: Object.assign(
                {},
                manifest && manifest.transitions && manifest.transitions.panelMove
              ),
              sidebarEnter: Object.assign(
                {},
                manifest && manifest.transitions && manifest.transitions.sidebarEnter
              ),
              sidebarExit: Object.assign(
                {},
                manifest && manifest.transitions && manifest.transitions.sidebarExit
              )
            },
            states: {}
          }

          for (var i = 0; i < FORM_ORDER.length; i++) {
            var form = FORM_ORDER[i]
            normalized.states[form] = Object.assign(
              {},
              base.states[form],
              manifest && manifest.states && manifest.states[form]
            )
          }

          return normalized
        }

        function resolvePackConfig() {
          var params = new URLSearchParams(window.location.search)
          var packId = params.get('pack') || DEFAULT_PACK_ID
          var assetBase =
            params.get('assetBase') ||
            new URL('../../kirby-packs/' + packId + '/', window.location.href).toString()
          var manifest = fallbackManifest(packId)
          var encodedManifest = params.get('packData')

          if (encodedManifest) {
            try {
              manifest = normalizeManifest(
                JSON.parse(decodeBase64Url(encodedManifest)),
                packId
              )
            } catch (err) {
              console.warn('[kirby] failed to parse pack manifest from URL, falling back to defaults', err)
            }
          }

          return {
            packId: packId,
            assetBase: assetBase,
            manifest: manifest
          }
        }

        function applyManifestCss(manifest) {
          var panel = manifest.layout && manifest.layout.panel ? manifest.layout.panel : {}
          var formSwitch = manifest.transitions && manifest.transitions.formSwitch
            ? manifest.transitions.formSwitch
            : {}
          document.documentElement.style.setProperty(
            '--kirby-panel-width',
            (panel.width || 120) + 'px'
          )
          document.documentElement.style.setProperty(
            '--kirby-panel-height',
            (panel.height || 120) + 'px'
          )
          document.documentElement.style.setProperty(
            '--kirby-form-transition-duration',
            (formSwitch.durationMs || 200) + 'ms'
          )
          document.documentElement.style.setProperty(
            '--kirby-form-scale-from',
            String(formSwitch.scaleFrom == null ? 0.9 : formSwitch.scaleFrom)
          )
          document.documentElement.style.setProperty(
            '--kirby-form-scale-to',
            String(formSwitch.scaleTo == null ? 1 : formSwitch.scaleTo)
          )
          document.documentElement.style.setProperty(
            '--kirby-form-transition-easing',
            formSwitch.easing || 'ease'
          )
        }

        function normalizeFrames(stateDef) {
          if (!stateDef) return []
          if (Array.isArray(stateDef.frames) && stateDef.frames.length > 0) {
            return stateDef.frames.map(function (frame) {
              if (typeof frame === 'string') {
                return {
                  src: frame,
                  durationMs: stateDef.frameDurationMs || 100
                }
              }
              return {
                src: frame.src,
                durationMs: frame.durationMs || stateDef.frameDurationMs || 100
              }
            })
          }
          if (typeof stateDef.src === 'string' && stateDef.src.length > 0) {
            return [{
              src: stateDef.src,
              durationMs: stateDef.frameDurationMs || 100
            }]
          }
          return []
        }

        function resolveFrameUrl(src) {
          return new URL(src, runtime.assetBase).toString()
        }

        function preloadUrl(url) {
          if (!url || runtime.assetCache[url]) return
          var img = new Image()
          img.decoding = 'async'
          img.src = url
          runtime.assetCache[url] = img
        }

        function preloadFrames(frames) {
          for (var i = 0; i < frames.length; i++) {
            var frame = frames[i]
            if (!frame || !frame.src) continue
            preloadUrl(resolveFrameUrl(frame.src))
          }
        }

        function preloadManifestAssets(manifest) {
          if (!manifest) return

          for (var i = 0; i < FORM_ORDER.length; i++) {
            var form = FORM_ORDER[i]
            preloadFrames(normalizeFrames(manifest.states && manifest.states[form]))
          }

          if (manifest.transitions && typeof manifest.transitions === 'object') {
            var names = Object.keys(manifest.transitions)
            for (var j = 0; j < names.length; j++) {
              preloadFrames(normalizeFrames(manifest.transitions[names[j]]))
            }
          }
        }

        function showFrame(node, index) {
          if (!node || !node.frames.length) return
          var frame = node.frames[index]
          if (!frame || !frame.src) return
          node.img.src = resolveFrameUrl(frame.src)
        }

        function stopStateAnimation() {
          if (runtime.stateTimer) {
            clearTimeout(runtime.stateTimer)
            runtime.stateTimer = 0
          }
          runtime.stateAnimationToken += 1
        }

        function stopTransitionAnimation() {
          if (runtime.transitionTimer) {
            clearTimeout(runtime.transitionTimer)
            runtime.transitionTimer = 0
          }
          runtime.transitionToken += 1
          runtime.transitionPlaying = false
          if (runtime.transitionLayer) {
            runtime.transitionLayer.wrapper.classList.remove('active')
            runtime.transitionLayer.img.removeAttribute('src')
          }
        }

        function scheduleNextFrame(form) {
          var node = runtime.nodes[form]
          var stateDef = runtime.manifest.states[form]
          if (!node || !node.frames || node.frames.length <= 1) return

          var token = runtime.stateAnimationToken
          var frame = node.frames[node.frameIndex]
          runtime.stateTimer = window.setTimeout(function () {
            if (token !== runtime.stateAnimationToken || activeForm !== form) return

            var nextIndex = node.frameIndex + 1
            if (nextIndex >= node.frames.length) {
              if (stateDef.loop === false) {
                return
              }
              nextIndex = 0
            }

            node.frameIndex = nextIndex
            showFrame(node, node.frameIndex)
            scheduleNextFrame(form)
          }, frame.durationMs || 100)
        }

        function playForm(form) {
          stopStateAnimation()
          var node = runtime.nodes[form]
          if (!node) return
          node.frameIndex = 0
          showFrame(node, 0)
          scheduleNextFrame(form)
        }

        function renderPack(config) {
          runtime.manifest = config.manifest
          runtime.assetBase = config.assetBase
          runtime.nodes = {}
          runtime.assetCache = {}

          applyManifestCss(config.manifest)
          root.innerHTML = ''

          for (var i = 0; i < FORM_ORDER.length; i++) {
            var form = FORM_ORDER[i]
            var stateDef = config.manifest.states[form]
            var wrapper = document.createElement('div')
            wrapper.className = 'kirby-form ' + FORM_CLASS[form]
            wrapper.setAttribute('data-form', form)

            var img = document.createElement('img')
            img.alt = stateDef.displayName || form
            img.draggable = false
            wrapper.appendChild(img)
            root.appendChild(wrapper)

            runtime.nodes[form] = {
              wrapper: wrapper,
              img: img,
              frames: normalizeFrames(stateDef),
              frameIndex: 0
            }
          }

          var transitionWrapper = document.createElement('div')
          transitionWrapper.className = 'kirby-form transition-layer'
          var transitionImg = document.createElement('img')
          transitionImg.alt = 'kirby transition'
          transitionImg.draggable = false
          transitionWrapper.appendChild(transitionImg)
          root.appendChild(transitionWrapper)
          runtime.transitionLayer = {
            wrapper: transitionWrapper,
            img: transitionImg
          }

          preloadManifestAssets(config.manifest)

          setForm(activeForm)
        }

        function setForm(form) {
          var target = runtime.nodes[form] ? form : 'floating'
          activeForm = target

          for (var i = 0; i < FORM_ORDER.length; i++) {
            var key = FORM_ORDER[i]
            var node = runtime.nodes[key]
            if (!node) continue
            if (key === target) {
              node.wrapper.classList.add('active')
            } else {
              node.wrapper.classList.remove('active')
            }
          }

          if (runtime.transitionPlaying) {
            return
          }

          stopTransitionAnimation()
          playForm(target)
        }

        window.__setKirbyForm = function (form) {
          setForm(form)
        }

        function playTransition(name) {
          var transitionDef = runtime.manifest.transitions && runtime.manifest.transitions[name]
          var frames = normalizeFrames(transitionDef || {})
          if (!runtime.transitionLayer || frames.length === 0) return

          stopStateAnimation()
          stopTransitionAnimation()
          runtime.transitionPlaying = true

          var token = runtime.transitionToken
          var layer = runtime.transitionLayer
          var index = 0
          layer.wrapper.classList.add('active')

          function step() {
            if (token !== runtime.transitionToken) return

            var frame = frames[index]
            if (!frame) {
              runtime.transitionPlaying = false
              layer.wrapper.classList.remove('active')
              playForm(activeForm)
              return
            }

            layer.img.src = resolveFrameUrl(frame.src)

            index += 1
            runtime.transitionTimer = window.setTimeout(function () {
              if (token !== runtime.transitionToken) return
              if (index >= frames.length) {
                runtime.transitionPlaying = false
                layer.wrapper.classList.remove('active')
                layer.img.removeAttribute('src')
                playForm(activeForm)
                return
              }
              step()
            }, frame.durationMs || 100)
          }

          step()
        }

        window.__playKirbyTransition = function (name) {
          playTransition(name)
        }

        // Kept for future runtime pack switching without touching the native
        // addon API. Main can inject a new manifest + asset base later.
        window.__setKirbyPack = function (encodedManifest, assetBase) {
          var manifest
          try {
            manifest = normalizeManifest(
              JSON.parse(decodeBase64Url(encodedManifest)),
              DEFAULT_PACK_ID
            )
          } catch (err) {
            console.warn('[kirby] failed to hot-swap asset pack', err)
            return
          }
          renderPack({
            manifest: manifest,
            assetBase: assetBase || runtime.assetBase,
            packId: manifest.meta && manifest.meta.id
          })
        }

        renderPack(resolvePackConfig())
      })()

      // Suppress WebKit's default context menu ("Reload" etc.) on the
      // Kirby ball. The native DragHandler's NSEvent right-click monitor
      // still fires and triggers opening the settings window — we just
      // don't want two menus (ours + WebKit's fallback) racing.
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault()
      })
    </script>
  </body>
</html>
